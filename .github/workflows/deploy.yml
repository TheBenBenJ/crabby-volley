name: Deploy

# Déploiement continu : à chaque push sur main, on lance les tests puis, s'ils
# passent, on synchronise index.html + src/ + assets/ vers la racine web du serveur.
# Le déploiement peut aussi être déclenché à la main (workflow_dispatch).
#
# Versionnage (SemVer x.y.z, voir package.json + src/00-version.js) : le job
# "deploy" incrémente automatiquement le PATCH à chaque push et repousse ce
# commit sur main — le message contient "[skip ci]" pour ne pas redéclencher
# une passe de test/déploiement sur ce commit-là (sinon boucle infinie). Les
# incréments MINOR/MAJOR restent manuels (bump à la main dans package.json
# selon l'ampleur du changement, comme n'importe quel projet SemVer).
on:
  push:
    branches: [main]
  workflow_dispatch:

# un seul déploiement à la fois ; on annule un déploiement en cours si un
# nouveau push arrive (on ne veut que la dernière version en prod).
concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  test:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Tests (filet de sécurité)
        run: npm test

  deploy:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    needs: test            # pas de déploiement si les tests échouent
    runs-on: ubuntu-latest
    permissions:
      contents: write      # pour repousser le commit de version
    # secrets/paramètres du serveur (voir README → Déploiement continu)
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      WEB_ROOT: ${{ secrets.DEPLOY_WEB_ROOT }}
    steps:
      - uses: actions/checkout@v4

      - name: Incrémente la version (patch) — package.json + src/00-version.js
        run: |
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            const parts = pkg.version.split('.').map(Number);
            parts[2]++;
            pkg.version = parts.join('.');
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            fs.writeFileSync('src/00-version.js',
              '// crabby-volley · version du jeu (générée automatiquement au déploiement\n' +
              '// — voir .github/workflows/deploy.yml — ne pas éditer à la main)\n' +
              '\"use strict\";\n' +
              'const GAME_VERSION = \"' + pkg.version + '\";\n');
            console.log('Nouvelle version : ' + pkg.version);
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src/00-version.js
          git commit -m "chore: bump version to $(node -p "require('./package.json').version") [skip ci]"
          git push

      - name: Anti-cache des scripts (?v=DEV → SHA du commit)
        run: sed -i "s/?v=DEV/?v=${GITHUB_SHA::8}/g" index.html

      - name: Configurer la clé SSH de déploiement
        env:
          # clé PRIVÉE encodée en base64 (évite tout problème de retours à la
          # ligne au copier-coller). Voir README → Déploiement continu.
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          # Le secret peut être collé en base64 (recommandé) OU en clé brute.
          # 1) on tente le base64 en retirant tout espace/retour (GNU base64 est
          #    strict) ; 2) sinon on retombe sur le contenu brut.
          printf '%s' "$DEPLOY_SSH_KEY" | tr -d '[:space:]' | base64 --decode > ~/.ssh/deploy_key 2>/dev/null || true
          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          # validation finale : message clair si le secret est inutilisable
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1 || { echo "::error::DEPLOY_SSH_KEY invalide (colle la clé privée, en base64 ou brute)"; exit 1; }
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Envoyer les fichiers (staging)
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            index.html src assets \
            "$DEPLOY_USER@$DEPLOY_HOST:/home/$DEPLOY_USER/crabby-deploy/"

      - name: Publier dans la racine web
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -e; \
             sudo mkdir -p '$WEB_ROOT/src' '$WEB_ROOT/assets'; \
             sudo cp /home/$DEPLOY_USER/crabby-deploy/index.html '$WEB_ROOT/index.html'; \
             sudo rsync -a --delete /home/$DEPLOY_USER/crabby-deploy/src/ '$WEB_ROOT/src/'; \
             sudo rsync -a --delete /home/$DEPLOY_USER/crabby-deploy/assets/ '$WEB_ROOT/assets/'; \
             sudo chown -R www-data:www-data '$WEB_ROOT/index.html' '$WEB_ROOT/src' '$WEB_ROOT/assets'"

      - name: Vérifier que le site répond
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' "https://${DEPLOY_HOST_NAME:-ns3104412.ip-37-187-139.eu}/")
          echo "HTTP $code"
          test "$code" = "200"
