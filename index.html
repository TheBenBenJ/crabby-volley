<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crabby Volley</title>
<!-- Typo de l'interface : grotesque (Inter) pour titres/corps + mono (Space Mono)
     pour les kickers/folios/labels techniques — registre « design suisse ». -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0e0f14;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Inter", system-ui, sans-serif;
    overflow: hidden;
  }
  #wrap { position: relative; }
  canvas {
    display: block;
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,.6);
    /* la taille CSS est pilotée par resizeCanvas() (Hi-DPI + plein écran) */
    max-width: 100vw;
    max-height: 100vh;
  }
  /* Contrôles tactiles (mobile) : superposés au canvas, pilotés depuis
     03-input.js. Masqués par défaut — affichés en JS uniquement sur un
     appareil tactile et pendant une manche jouable (voir touchKeySet()). */
  #touchControls { position: absolute; inset: 0; display: none; pointer-events: none; }
  #touchControls.tc-visible { display: block; }
  .tc-pad, .tc-actions { position: absolute; bottom: 4%; display: flex; gap: 14px; pointer-events: auto; }
  .tc-pad { left: 4%; }
  .tc-actions { right: 4%; align-items: flex-end; }
  .tc-btn {
    width: 60px; height: 60px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
    background: rgba(20,20,30,0.35);
    color: #fff; font-size: 22px; font-family: inherit;
    display: flex; align-items: center; justify-content: center;
    touch-action: none; user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  .tc-btn.tc-active { background: rgba(255,204,0,0.4); border-color: #ffcc00; }
  .tc-jump { width: 72px; height: 72px; font-size: 26px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="900" height="500"></canvas>
  <div id="touchControls" aria-hidden="true">
    <div class="tc-pad">
      <button class="tc-btn tc-left" data-tc="left" type="button">◀</button>
      <button class="tc-btn tc-right" data-tc="right" type="button">▶</button>
    </div>
    <div class="tc-actions">
      <button class="tc-btn tc-super" data-tc="super" type="button">★</button>
      <button class="tc-btn tc-jump" data-tc="jump" type="button">⤒</button>
    </div>
  </div>
</div>
<!-- PeerJS : signalisation cloud gratuite pour le mode en ligne (voir MULTIJOUEUR.md).
     Si le CDN est inaccessible, le jeu reste jouable hors ligne : seul le mode
     en ligne affichera un message d'erreur. -->
<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
<!-- Modules du jeu, chargés dans l’ordre de dépendance (voir README).
     Scripts classiques : ils partagent le même scope global, comme
     l’ancien fichier unique — le découpage est purement organisationnel. -->
<!-- ?v=DEV : anti-cache — remplacé par le SHA du commit au déploiement (voir
     .github/workflows/deploy.yml) pour que chaque push serve du frais, même
     à un navigateur qui aurait mis les scripts en cache. -->
<script src="src/00-version.js?v=DEV"></script>
<script src="src/01-core.js?v=DEV"></script>
<script src="src/01b-assets.js?v=DEV"></script>
<script src="src/02-audio.js?v=DEV"></script>
<script src="src/03-input.js?v=DEV"></script>
<script src="src/04-state.js?v=DEV"></script>
<script src="src/05-animals.js?v=DEV"></script>
<script src="src/06-physics.js?v=DEV"></script>
<script src="src/07-scoring.js?v=DEV"></script>
<script src="src/08-ai.js?v=DEV"></script>
<script src="src/09-particles.js?v=DEV"></script>
<script src="src/10-scenery.js?v=DEV"></script>
<script src="src/11-terrains.js?v=DEV"></script>
<script src="src/12-menus.js?v=DEV"></script>
<script src="src/13-simulation.js?v=DEV"></script>
<script src="src/14-snapshots.js?v=DEV"></script>
<script src="src/15-net.js?v=DEV"></script>
<script src="src/16-render.js?v=DEV"></script>
<script src="src/17-main.js?v=DEV"></script>
</body>
</html>
